name: Update Changuito Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run data update
        env:
          PROVINCES: AR-C,AR-B,CIUDAD AUTONOMA DE BUENOS AIRES,BUENOS AIRES
          MAX_RECORDS_PER_DAY: "120000"
          MAX_SNAPSHOTS: "45"
          MAX_RESOURCES_PER_RUN: "3"
          MAX_PRODUCTS: "3000"
          MAX_STORES: "180"
          CKAN_BASE_URL: https://datos.produccion.gob.ar
          DATASET_ID: sepa-precios
        run: python scripts/update_data.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: update changuito snapshots"
          git push
